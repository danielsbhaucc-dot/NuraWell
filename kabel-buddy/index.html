<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#059669" />
    <meta name="description" content="מחשבון קוטר כבל לפי תקנות החשמל — שאלון פשוט לחשמלאים" />
    <title>כבל-באדי ⚡ בוחרים קוטר נכון</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true"></div>

    <div class="app">
      <header class="header">
        <div class="badge">📋 לפי תקנות החשמל תשע״ד-2014</div>
        <h1>כבל-באדי <span class="header-emoji">⚡</span></h1>
        <p class="header-sub">היי חשמלאי/ת יקר/ה 👋 בנינו את זה בשביל אנשים כמוך — בלי טבלאות מבלבלות, רק שאלות פשוטות ותשובה ברורה</p>
      </header>

      <main class="glass-panel" id="wizard">
        <div class="progress-wrap">
          <div class="progress-label">
            <span id="step-label">שלב 1 מתוך 6</span>
            <span id="step-percent">17%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width: 17%"></div></div>
        </div>
        <div id="step-content"></div>
        <div class="nav-row" id="nav-row">
          <button type="button" class="btn btn-ghost hidden" id="btn-back">→ חזרה</button>
          <button type="button" class="btn btn-primary" id="btn-next">יופי, הבא ←</button>
        </div>
      </main>

      <footer class="legal-footer">
        מבוסס על
        <a href="https://www.nevo.co.il/law_html/law00/131976.htm" target="_blank" rel="noopener">תקנות החשמל (העמסה והגנה)</a>
        · עדכון בנבו: 17.02.2026<br />
        הכלי עוזר בחישוב — האחריות הסופית עליך כחשמלאי/ת מוסמך/ת ✅
      </footer>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
